<!--
  Maskable Icon für Android PWA.
  Die "safe zone" ist ein Kreis mit 80% Durchmesser.
  Das Icon-Motiv liegt vollständig innerhalb dieser Zone.
  Hintergrund ist vollflächig (kein rx), da Android selbst die Form bestimmt.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Vollflächiger Hintergrund (für Maskable erforderlich) -->
  <rect width="512" height="512" fill="#0D0D0B"/>
  <rect width="512" height="512" fill="url(#bg-mask)" opacity="0.4"/>

  <!-- Dekorativer Kreis -->
  <circle cx="256" cy="256" r="200" fill="#E8A825" opacity="0.08"/>

  <!-- Gabel (zentriert, innerhalb safe zone 205px-307px x-Bereich) -->
  <path d="M196 136 L196 206" stroke="#E8A825" stroke-width="16" stroke-linecap="round"/>
  <path d="M224 136 L224 206" stroke="#E8A825" stroke-width="16" stroke-linecap="round"/>
  <path d="M252 136 L252 206" stroke="#E8A825" stroke-width="16" stroke-linecap="round"/>
  <path d="M196 206 Q196 250 224 256 Q252 250 252 206"
        stroke="#E8A825" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M224 256 L224 376" stroke="#E8A825" stroke-width="16" stroke-linecap="round"/>

  <!-- Messer -->
  <path d="M290 136 Q326 158 326 220 L290 220 Z" fill="#F5F0E8" opacity="0.85"/>
  <path d="M290 220 L290 376" stroke="#F5F0E8" stroke-width="16" stroke-linecap="round" opacity="0.85"/>

  <defs>
    <linearGradient id="bg-mask" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1E1E18"/>
      <stop offset="100%" stop-color="#0D0D0B"/>
    </linearGradient>
  </defs>
</svg>
